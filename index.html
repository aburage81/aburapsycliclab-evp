<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脂毛EVPラボ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background: #c0c0c0;
            color: #000000;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            image-rendering: pixelated;
        }

        .mac-window {
            background: #c0c0c0;
            border: 2px solid #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 3px 3px 0 #000000;
            max-width: 1000px;
            margin: 0 auto;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .title-bar-buttons {
            display: flex;
            gap: 6px;
        }

        .btn {
            width: 18px;
            height: 18px;
            background: #c0c0c0;
            border: 1px solid #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            text-align: center;
            line-height: 14px;
            font-size: 12px;
        }

        .content {
            padding: 20px;
            background: #c0c0c0;
            min-height: 600px;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            text-align: center;
            color: #000;
        }

        .subtitle {
            text-align: center;
            color: #000;
            margin-bottom: 25px;
            font-size: 18px;
        }

        .search {
            width: 100%;
            padding: 8px 12px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            border: 2px inset #ffffff;
            background: #ffffff;
            margin-bottom: 25px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .post {
            background: #c0c0c0;
            border: 2px inset #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 12px;
            font-size: 17px;
        }

        .post-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: #000080;
        }

        .post-text {
            line-height: 1.5;
        }

        .source-link {
            color: #0000ff;
            text-decoration: underline;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="mac-window">
        <!-- タイトルバー -->
        <div class="title-bar">
            <div>👻 脂毛EVPラボ</div>
            <div class="title-bar-buttons">
                <div class="btn">−</div>
                <div class="btn">□</div>
                <div class="btn">×</div>
            </div>
        </div>

        <div class="content">
            <h1>電子音声現象アーカイブ</h1>
            <p class="subtitle">霊界からの声 — System 7 Style</p>

            <input type="text" id="search" class="search" placeholder="🔍 キーワード検索" onkeyup="filterPosts()">

            <div class="posts-grid" id="posts"></div>
        </div>
    </div>

    <script>
        const posts = [
            {date:"2026-04-28", source:"Wikipedia", text:"電子音声現象（EVP）とは、電子機器で死後世界と交信を試みる現象。通常録音中に直接聞こえない声が後で聞こえる。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1959", source:"Friedrich Jürgenson", text:"亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1952", source:"ジェメリ神父", text:"聖歌録音中に亡き父親の声が聞こえた事例", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1970年代", source:"Konstantin Raudive", text:"72,000件以上のEVPを収集。無音の部屋でも声が録音された。", url:"https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"}
        ];

        function renderPosts(data) {
            document.getElementById('posts').innerHTML = data.map(p => `
                <div class="post">
                    <div class="post-header">${p.date}　｜　${p.source}</div>
                    <div class="post-text">${p.text}</div>
                    <a href="${p.url}" target="_blank" class="source-link">🔗 出典を見る</a>
                </div>
            `).join('');
        }

        function filterPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
            renderPosts(filtered.length ? filtered : posts);
        }

        renderPosts(posts);
    </script>
</body>
</html>
