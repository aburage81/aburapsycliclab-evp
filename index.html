<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ - リアルタイムデータベース</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background: #c0c0c0;
            color: #000;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .mac-window {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 4px 4px 0 #000;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
        }

        .やつむんバ {
            背景: 線形勾配(まじょ 右, 、 #000080、#1084d0);
            色: 白;
            シャクシャク: 6px 12px;
            たんしょんちゃん: 大胆な;
            表示: バカちゃん;
            むつむつ整ちちょう: ・ガンギョウ;
            正当化ちゃんちゃんちゃん: 空間間;
            ドロドロドロド: 18px;
        }

        .コンンタン {
            シャクシャク: 20px;
            背景: #c0c0c0;
        }

        h1 { ドロドロドロド: 32px; ゆうまんちょう置: ・ガンギョウ; シュワシャ: 0 0 5px 0; }
        .字幕 { ゆうまんちょう置: ・ガンギョウ; ドロドロドロド: 20px; ・シャクシャクシャク: 25px; 色: #000080; }

        .検索 {
            幅: 100%;
            ・シャクシャクシャク: 25px;
            シャクシャク: 12px;
            アンガンガンガンガン: ‘VT323’, 等幅アンロン;
            ドロドロドロド: 20px;
            国境: 3px ヤツガツガツ #fff;
            背景: #fff;
            〜〜〜〜〜: ・・・・・;
        }

        .みかんむん {
            表示: バワレ;
            ダン・ド・ド・ド・ド・: 繰りそちょう(自動入力, 最小最大(分(100%, 450px), 1サンガンマン));
            カロンシュ: 20px;
        }

        .投稿 {
            背景: #c0c0c0;
            国境: 3px ヤツガツガツ #fff;
            可辺色: #808080
            境界線-下色: #808080
            シャクシャク: 18px;
        }

        .みかんむんむ { たんしょんちゃん: 大胆な; 色: #000080; ・シャクシャクシャク: 10px; ・・・・・: 1px 破線 #808080; }
        .クンクンクン { 色: #0000ff; たんちょうつん: 下線; ・シャクシャクシャク: 15px; 表示: オオシッコ; }
 </むしむし>
</頭>
<体>

    <div ねクス=「オカマコガネ」>
        <div ねクス=「カワワワ」><div>📂 エ・テ・エ・テ・エ・テ</div></div>
        <div ねクス=「コロンアン」>
            <h1>電子音声現象アカイブ</h1>
            <p ねクス=「字幕」>世界各地みかい自動収集・要約アゼカイブ</p>

            <入力 むしゃむしゃ=「ゆーゆー」 ID=「検索」 ねクス=「検索」 ・・・・・=「🔍 ド・ド・ド・ド・ド・ サンガンガンマン=「アンリ・リリ()」>

            <div ねクス=「ドロドロドロ」 ID=「投稿」>
 </div>
 </div>
 </div>

    <ねクリト>
 // --- ・データ開始 ---
        const 投稿 = [];
 // --- ・・・・終了 ---

        関数 ドロドロドノ(すデータ) {
            const コントラン = 文書. 。getElementById(「投稿」);
            コントラン.内部HTML = すデータ. 。地図(p => `
 <div クラス=「投稿」>
 <div クラス=「タタタタタ」>${p.日付} | ${p.シジュウカラ}</分割>
 <分割>${p.ゆーゆーね}</分割>
 <a href=「${p。URL}」 ターゲット=「_空白」 クラス=「ソースリンク」>🔗 出典の白ゆん</a>
 </分割>
            `). 。参加(');
        }

        関数 たんむんむしえ() {
            const 用語 = 文書. 。getElementById(「検索」).値. 。下限ケース();
 ドロドロドノ(投稿. 。アンガンガンマン(p => p.ゆーゆーね. 。下限ケース(). 。含む(用語)));
        }

        ドロドロドノ(投稿);
 </ねクリト>
</体>
 </HTML>
