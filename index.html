<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂心霊パラノーマルBOT - リアルタイム怪現象データベース</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { 
            background: #c0c0c0; 
            color: #000; 
            font-family: 'VT323', monospace; 
            margin: 0; 
            padding: 20px 10px; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        .mac-window { 
            background: #c0c0c0; 
            border: 3px solid #fff; 
            border-right-color: #808080; 
            border-bottom-color: #808080; 
            box-shadow: 4px 4px 0 #000; 
            max-width: 1000px; 
            width: 100%; 
            margin: 0 auto; 
            overflow: hidden; 
        }
        .title-bar { 
            background: linear-gradient(to right, #000080, #1084d0); 
            color: white; 
            padding: 6px 12px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 18px; 
        }
        .content { 
            padding: 20px; 
            background: #c0c0c0; 
        }
        
        /* タイトルリンク設定 */
        h1 { 
            font-size: 32px; 
            text-align: center; 
            margin: 0 0 5px 0; 
            cursor: pointer; 
            text-decoration: none; 
            color: #000; 
        }
        h1:hover { color: #000080; }

        .subtitle { 
            text-align: center; 
            font-size: 20px; 
            margin-bottom: 5px; 
            color: #000080; 
        }
        
        .last-update {
            text-align: center; 
            font-size: 14px; 
            margin-bottom: 25px; 
            color: #555;
            letter-spacing: 1px;
        }

        .search { 
            width: 100%; 
            margin-bottom: 25px; 
            padding: 12px; 
            font-family: 'VT323', monospace; 
            font-size: 20px; 
            border: 3px inset #fff; 
            background: #fff; 
            box-sizing: border-box; 
        }
        
        .posts-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 450px), 1fr)); 
            gap: 20px; 
        }
        
        .post { 
            background: #c0c0c0; 
            border: 3px inset #fff; 
            border-right-color: #808080; 
            border-bottom-color: #808080; 
            padding: 18px; 
            transition: all 0.1s; 
        }
        .post:hover { 
            background: #d0d0d0; 
            border: 3px solid #000080; 
            box-shadow: inset 2px 2px 0 #fff; 
            cursor: pointer; 
        }
        
        .post-header { 
            font-weight: bold; 
            color: #000080; 
            margin-bottom: 10px; 
            border-bottom: 1px dashed #808080; 
            font-size: 16px;
        }
        
        .source-link { 
            color: #0000ff; 
            text-decoration: underline; 
            margin-top: 15px; 
            display: block; 
            font-size: 16px;
        }

        .pagination { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 25px; 
            padding-bottom: 20px; 
        }
        .page-btn { 
            padding: 8px 20px; 
            background: #c0c0c0; 
            border: 3px solid #fff; 
            border-right-color: #808080; 
            border-bottom-color: #808080; 
            cursor: pointer; 
            font-family: 'VT323'; 
            font-size: 20px; 
            box-shadow: 2px 2px 0 #000; 
        }
        .page-btn:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }
        .page-btn:disabled { 
            color: #808080; 
            cursor: default; 
            box-shadow: none; 
            transform: none;
        }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="title-bar">
            <div>📂 リアルタイム怪現象データベース</div>
            <div style="font-size: 14px;">[Ver 5.0.0]</div>
        </div>
        <div class="content">
            <h1 onclick="location.href='./';">脂心霊パラノーマルBOT</h1>
            <p class="subtitle">世界各地からの自動収集・要約アーカイブ</p>
            <p id="last-update" class="last-update">LAST UPDATE: ---</p>
            
            <input type="text" id="search" class="search" placeholder="🔍 キーワードで絞り込む（例: #Audio, #Russia, #Mandela）" onkeyup="searchPosts()">
            
            <div class="posts-grid" id="posts"></div>
            
            <div class="pagination">
                <button id="prevBtn" class="page-btn" onclick="changePage(-1)">PREV</button>
                <span id="pageInfo" style="font-size:22px; align-self:center;">PAGE 1</span>
                <button id="nextBtn" class="page-btn" onclick="changePage(1)">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA START ---
        // Pythonボットがこの変数を直接書き換えます
        const posts = [];
        const lastUpdated = "2026-04-29 18:00";
        // --- DATA END ---

        let currentPage = 1;
        const postsPerPage = 10;
        let filteredPosts = [...posts];

        function render() {
            // 更新日時の表示反映
            document.getElementById('last-update').innerText = `LAST UPDATE: ${lastUpdated}`;
            
            const start = (currentPage - 1) * postsPerPage;
            const end = start + postsPerPage;
            const target = filteredPosts.slice(start, end);
            const container = document.getElementById('posts');
            
            if (target.length === 0) {
                container.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding: 50px; font-size: 24px;">信号が見つかりません...</div>';
            } else {
                container.innerHTML = target.map(p => `
                    <div class="post" onclick="window.open('${p.url}', '_blank')">
                        <div class="post-header">${p.date} | ${p.source}</div>
                        <div style="font-size: 20px; line-height: 1.4;">${p.text}</div>
                        <span class="source-link">🔗 出典スレッドを確認</span>
                    </div>
                `).join('');
            }
            
            document.getElementById('pageInfo').innerText = `PAGE ${currentPage}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= filteredPosts.length;
        }

        function changePage(dir) {
            currentPage += dir;
            render();
            window.scrollTo(0, 0);
        }

        function searchPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            filteredPosts = posts.filter(p => 
                p.text.toLowerCase().includes(term) || 
                p.source.toLowerCase().includes(term)
            );
            currentPage = 1;
            render();
        }

        // 初回起動
        render();
    </script>
</body>
</html>
