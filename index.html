<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ - 電子音声現象アーカイブ</title>
    <style>
        body { background:#0a0a0a; color:#eee; font-family:sans-serif; padding:20px; line-height:1.6; }
        h1 { color:#ff3333; text-align:center; }
        .subtitle { text-align:center; color:#88ff88; font-size:18px; }
        input { 
            width:100%; 
            padding:15px; 
            margin:20px 0; 
            background:#1f1f1f; 
            color:white; 
            border:1px solid #444; 
            border-radius:6px; 
            font-size:18px; 
        }
        .post { 
            background:#1a1a1a; 
            padding:18px; 
            margin:15px 0; 
            border-radius:8px; 
            border-left:6px solid #ff6666; 
        }
        a { color:#ffcc00; text-decoration:none; }
        a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <h1>👻 脂毛EVPラボ</h1>
    <p class="subtitle">電子音声現象（EVP）アーカイブ｜毎日自動更新中</p>
    
    <!-- 検索バー修正 -->
    <input type="text" id="search" placeholder="🔍 キーワード検索" onkeyup="filterPosts()">

    <div id="posts"></div>

    <script>
        const posts = [
            {
                date: "2026-04-28",
                source: "Wikipedia JP",
                text: "電子音声現象（EVP）とは、電子機器で死後世界と交信を試みる現象。通常録音中に直接聞こえない声が後で聞こえる。",
                url: "https://ja.wikipedia.org/wiki/電子音声現象"
            },
            {
                date: "1959",
                source: "Friedrich Jürgenson",
                text: "亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』が録音された有名事例。",
                url: "https://ja.wikipedia.org/wiki/電子音声現象"
            },
            {
                date: "1952",
                source: "ジェメリ神父",
                text: "聖歌録音中に亡き父親の声が『いつでもお前の側にいる』とあだ名で呼んだ。",
                url: "https://ja.wikipedia.org/wiki/電子音声現象"
            },
            {
                date: "1970年代",
                source: "Konstantin Raudive",
                text: "72,000件以上のEVPを収集。無音の部屋でも多数の声が録音された。",
                url: "https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"
            },
            {
                date: "現代",
                source: "karapaia",
                text: "心霊界から届く声を記録した超常現象。録音中に直接聞こえない声が後で聞こえる。",
                url: "https://karapaia.com/archives/52176540.html"
            }
        ];

        function renderPosts(data) {
            let html = '';
            data.forEach(p => {
                html += `
                    <div class="post">
                        <strong>[${p.source}] ${p.date}</strong><br><br>
                        <p>${p.text}</p>
                        <a href="${p.url}" target="_blank">🔗 出典リンク</a>
                    </div>`;
            });
            document.getElementById('posts').innerHTML = html;
        }

        function filterPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
            renderPosts(filtered.length ? filtered : posts);
        }

        renderPosts(posts);
    </script>
</body>
</html>
