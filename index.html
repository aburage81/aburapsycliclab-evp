<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ - 世界の電子音声現象アーカイブ</title>
    <style>
        body { background:#0a0a0a; color:#f0f0f0; font-family:'Noto Sans JP', sans-serif; margin:0; padding:0; }
        header { background:#1a0000; padding:40px 20px; text-align:center; border-bottom:4px solid #ff4444; }
        h1 { font-size:3.2rem; color:#ff5555; margin:0; }
        .subtitle { color:#ffdddd; font-size:1.3rem; }
        .search-container { max-width:700px; margin:30px auto; position:relative; }
        input { width:100%; padding:18px 25px 18px 60px; background:#1f1a1a; border:2px solid #555; border-radius:50px; color:white; font-size:1.15rem; }
        .posts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:20px; padding:0 20px; max-width:1200px; margin:0 auto; }
        .post { background:#1a1414; border:1px solid #552222; border-radius:12px; padding:20px; }
        .post:hover { border-color:#ff6666; }
        .post-header { color:#aaffaa; margin-bottom:10px; }
    </style>
</head>
<body>
    <header>
        <h1>👻 脂毛EVPラボ</h1>
        <p class="subtitle">世界中の電子音声現象アーカイブ</p>
    </header>

    <div class="search-container">
        <input type="text" id="search" placeholder="🔍 キーワード検索" onkeyup="filterPosts()">
    </div>

    <div class="posts-grid" id="posts"></div>

    <script>
        const posts = [
            {date:"1959", source:"Friedrich Jürgenson (スウェーデン)", text:"鳥の録音中に亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』が録音された。EVP研究のきっかけとなった有名事例。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1952", source:"ジェメリ神父 (ヴァチカン)", text:"聖歌録音中に亡き父親の声が『いつでもお前の側にいる』と幼少期のあだ名で呼んだ。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1970年代", source:"Konstantin Raudive (ラトビア)", text:"72,000件以上のEVPを収集。無音の部屋でも数百の声が録音された。", url:"https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"},
            {date:"現代", source:"Connecticut Ghost Hunter (USA)", text:"『Child Counting to Three』『We're not dead』『Please Help Me』などの明確なEVPを多数収録。", url:"http://www.connecticutghosthunter.com/evp-examples.html"},
            {date:"現代", source:"世界各地の調査", text:"『Help me!』『Get out』『I am here』が最も頻出するEVP応答。", url:"https://www.intuitive-investigations.com"},
            {date:"現代", source:"karapaia (日本)", text:"心霊界から届く声を記録した超常現象。録音中に直接聞こえない声が後で聞こえる。", url:"https://karapaia.com/archives/52176540.html"}
            // ここにさらに世界中の事例を自動追加可能
        ];

        function renderPosts(data) {
            document.getElementById('posts').innerHTML = data.map(p => `
                <div class="post">
                    <div class="post-header">${p.date}　｜　${p.source}</div>
                    <p>${p.text}</p>
                    <a href="${p.url}" target="_blank" style="color:#ffcc00;">🔗 出典</a>
                </div>
            `).join('');
        }

        function filterPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
            renderPosts(filtered.length ? filtered : posts);
        }

        renderPosts(posts);
    </script>
</body>
</html>
