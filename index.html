<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background: #c0c0c0;
            color: #000000;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            image-rendering: pixelated;
        }

        .mac-window {
            background: #c0c0c0;
            border: 3px solid #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 4px 4px 0 #000000;
            max-width: 1400px;           /* ← 広くしました */
            margin: 0 auto;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 6px 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title-bar-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 20px;
            height: 20px;
            background: #c0c0c0;
            border: 1px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            text-align: center;
            line-height: 16px;
            font-size: 14px;
        }

        .content {
            padding: 25px;
            background: #c0c0c0;
            min-height: 700px;
        }

        h1 {
            font-size: 32px;
            text-align: center;
            margin: 0 0 10px 0;
            color: #000;
        }

        .subtitle {
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
            color: #000080;
        }

        .search {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px;
            display: block;
            padding: 12px 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            border: 3px inset #ffffff;
            background: #ffffff;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); /* ← 広く */
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .post {
            background: #c0c0c0;
            border: 3px inset #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 18px;
            transition: all 0.2s;
            cursor: default;
        }

        .post:hover {
            border-color: #ff0000;
            border-style: outset;
            background: #e0e0e0;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .post-header {
            font-weight: bold;
            color: #000080;
            margin-bottom: 10px;
        }

        .source-link {
            color: #0000ff;
            text-decoration: underline;
            margin-top: 12px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="title-bar">
            <div>👻 脂毛EVPラボ</div>
            <div class="title-bar-buttons">
                <div class="btn">−</div>
                <div class="btn">□</div>
                <div class="btn">×</div>
            </div>
        </div>

        <div class="content">
            <h1>電子音声現象アーカイブ</h1>
            <p class="subtitle">System 7 Style — 世界の霊界の声</p>

            <input type="text" id="search" class="search" placeholder="🔍 キーワード検索" onkeyup="filterPosts()">

            <div class="posts-grid" id="posts"></div>
        </div>
    </div>

    <script>
        const posts = [
            {date:"2026-04-28", source:"Wikipedia JP", text:"電子音声現象（EVP）とは、電子機器で死後世界と交信を試みる現象。通常録音中に直接聞こえない声が後で聞こえる。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1959", source:"Friedrich Jürgenson (スウェーデン)", text:"亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1952", source:"ジェメリ神父 (ヴァチカン)", text:"聖歌録音中に亡き父親の声が『いつでもお前の側にいる』とあだ名で呼んだ。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1970年代", source:"Konstantin Raudive (ラトビア)", text:"72,000件以上のEVPを収集。無音の部屋でも多数の声が録音された。", url:"https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"},
            {date:"現代", source:"karapaia (日本)", text:"心霊界から届く声を記録した超常現象。", url:"https://karapaia.com/archives/52176540.html"}
        ];

        function renderPosts(data) {
            document.getElementById('posts').innerHTML = data.map(p => `
                <div class="post">
                    <div class="post-header">${p.date}　｜　${p.source}</div>
                    <div>${p.text}</div>
                    <a href="${p.url}" target="_blank" class="source-link">🔗 出典を見る</a>
                </div>
            `).join('');
        }

        function filterPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
            renderPosts(filtered.length ? filtered : posts);
        }

        renderPosts(posts);
    </script>
</body>
</html>
