<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂心霊パラノーマルBOT - リアルタイム怪現象データベース</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { 
            background: #c0c0c0; 
            color: #000; 
            font-family: 'VT323', monospace; 
            margin: 0; 
            padding: 20px 10px; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        .mac-window { 
            background: #c0c0c0; 
            border: 3px solid #fff; 
            border-right-color: #808080; 
            border-bottom-color: #808080; 
            box-shadow: 4px 4px 0 #000; 
            max-width: 1000px; 
            width: 100%; 
            margin: 0 auto; 
        }
        .title-bar { 
            background: linear-gradient(to right, #000080, #1084d0); 
            color: white; 
            padding: 6px 12px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 18px; 
        }
        .content { padding: 20px; }
        
        h1 { font-size: 32px; text-align: center; margin: 0; cursor: pointer; }
        .subtitle { text-align: center; font-size: 20px; margin: 5px 0; color: #000080; }
        .last-update { text-align: center; font-size: 14px; margin-bottom: 20px; color: #555; }

        /* 検索セクションの改良 */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-input, .tag-select { 
            padding: 10px; 
            font-family: 'VT323'; 
            font-size: 20px; 
            border: 3px inset #fff; 
            background: #fff; 
        }
        .search-input { flex-grow: 2; }
        .tag-select { flex-grow: 1; cursor: pointer; }

        .posts-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 450px), 1fr)); 
            gap: 20px; 
        }
        
        .post { 
            background: #c0c0c0; 
            border: 3px inset #fff; 
            border-right-color: #808080; 
            border-bottom-color: #808080; 
            padding: 18px; 
        }
        
        .post-header { 
            font-weight: bold; 
            color: #000080; 
            margin-bottom: 10px; 
            border-bottom: 1px dashed #808080; 
            display: flex;
            justify-content: space-between;
        }

        /* タグのスタイル */
        .tag-link {
            color: #000080;
            cursor: pointer;
            padding: 0 4px;
            text-decoration: underline;
        }
        .tag-link:hover {
            background-color: yellow; /* マウスオンで黄色ハイライト */
            color: #000;
        }

        .source-link { 
            color: #0000ff; 
            text-decoration: underline; 
            margin-top: 15px; 
            display: block; 
        }

        .pagination { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .page-btn { 
            padding: 8px 20px; background: #c0c0c0; border: 3px solid #fff; 
            border-right-color: #808080; border-bottom-color: #808080; cursor: pointer; 
            font-family: 'VT323'; font-size: 20px; box-shadow: 2px 2px 0 #000; 
        }
        .page-btn:disabled { color: #808080; box-shadow: none; }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="title-bar">
            <div>📂 リアルタイム怪現象データベース</div>
            <div style="font-size: 14px;">[Ver 5.5.0]</div>
        </div>
        <div class="content">
            <h1 onclick="location.href='./';">脂心霊パラノーマルBOT</h1>
            <p class="subtitle">世界各地からの自動収集・要約アーカイブ</p>
            <p id="last-update" class="last-update">LAST UPDATE: ---</p>
            
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="🔍 キーワード検索..." onkeyup="filterPosts()">
                <select id="tagFilter" class="tag-select" onchange="filterPosts()">
                    <option value="">ALL TAGS (全て表示)</option>
                    <option value="#Audio">#Audio (音声/EVP)</option>
                    <option value="#Orb">#Orb (光球)</option>
                    <option value="#OBE">#OBE (幽体離脱)</option>
                    <option value="#Mandela">#Mandela (記憶異常)</option>
                    <option value="#Psy">#Psy (超能力/ESP)</option>
                    <option value="#Physical">#Physical (物理現象)</option>
                    <option value="#NHI">#NHI (非人類知性)</option>
                    <option value="#Object">#Object (呪物/物体)</option>
                    <option value="#Paranormal">#Paranormal (その他)</option>
                </select>
            </div>
            
            <div class="posts-grid" id="posts"></div>
            
            <div class="pagination">
                <button id="prevBtn" class="page-btn" onclick="changePage(-1)">PREV</button>
                <span id="pageInfo" style="font-size:22px; align-self:center;">PAGE 1</span>
                <button id="nextBtn" class="page-btn" onclick="changePage(1)">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA START ---
        const posts = []; 
        const lastUpdated = "2026-04-29 19:10"; 
        // --- DATA END ---

        let currentPage = 1;
        const postsPerPage = 10;
        let filteredPosts = [...posts];

        function render() {
            document.getElementById('last-update').innerText = `LAST UPDATE: ${lastUpdated} (JST)`;
            const start = (currentPage - 1) * postsPerPage;
            const end = start + postsPerPage;
            const target = filteredPosts.slice(start, end);
            const container = document.getElementById('posts');
            
            if (target.length === 0) {
                container.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding: 50px; font-size: 24px;">信号が見つかりません...</div>';
            } else {
                container.innerHTML = target.map(p => {
                    // テキストからタグを分離してクリック可能にする
                    const tagMatch = p.text.match(/^(#[a-zA-Z]+)\s(.*)/);
                    const tag = tagMatch ? tagMatch[1] : "#Paranormal";
                    const body = tagMatch ? tagMatch[2] : p.text;

                    return `
                        <div class="post">
                            <div class="post-header">
                                <span>${p.date}</span>
                                <span class="tag-link" onclick="quickFilter('${tag}')">${tag}</span>
                            </div>
                            <div style="font-size: 20px; line-height: 1.4;">${body}</div>
                            <a href="${p.url}" target="_blank" class="source-link">🔗 出典を確認</a>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('pageInfo').innerText = `PAGE ${currentPage}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= filteredPosts.length;
        }

        function filterPosts() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const tagTerm = document.getElementById('tagFilter').value.toLowerCase();

            filteredPosts = posts.filter(p => {
                const matchesSearch = p.text.toLowerCase().includes(searchTerm);
                const matchesTag = tagTerm === "" || p.text.toLowerCase().includes(tagTerm);
                return matchesSearch && matchesTag;
            });

            currentPage = 1;
            render();
        }

        function quickFilter(tag) {
            document.getElementById('tagFilter').value = tag;
            document.getElementById('search').value = ""; // キーワードはリセット
            filterPosts();
            window.scrollTo(0, 0);
        }

        function changePage(dir) {
            currentPage += dir;
            render();
            window.scrollTo(0, 0);
        }

        render();
    </script>
</body>
</html>
