<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ - 電子音声現象アーカイブ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap');

        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0000 100%);
            color: #ddd;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem 0;
            text-align: center;
            border-bottom: 3px solid #ff3333;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.3);
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 3.2rem;
            color: #ff4444;
            text-shadow: 0 0 15px #ff0000;
            margin: 0;
        }

        .subtitle {
            color: #aaa;
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-container {
            position: relative;
            margin: 30px auto;
            max-width: 700px;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(30, 30, 30, 0.95);
            border: 2px solid #444;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.5);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #ff6666;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .post {
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #440000;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .post:hover {
            transform: translateY(-8px);
            border-color: #ff6666;
            box-shadow: 0 10px 25px rgba(255, 50, 50, 0.2);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #88ff99;
        }

        .post-text {
            line-height: 1.7;
            color: #eee;
        }

        .source-link {
            color: #ffcc00;
            font-size: 0.9rem;
            margin-top: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <header>
        <h1>👻 脂毛EVPラボ</h1>
        <p class="subtitle">電子音声現象アーカイブ — 霊界からの声</p>
    </header>

    <div class="container">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="キーワード検索" onkeyup="filterPosts()">
        </div>

        <div class="posts-grid" id="posts"></div>
    </div>

    <script>
        const posts = [
            {date:"2026-04-28", source:"Wikipedia JP", text:"電子音声現象（EVP）とは、電子機器で死後世界と交信を試みる現象。通常録音中に直接聞こえない声が後で聞こえる。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1959", source:"Friedrich Jürgenson", text:"亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』が録音された有名事例。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1952", source:"ジェメリ神父", text:"聖歌録音中に亡き父親の声が『いつでもお前の側にいる』とあだ名で呼んだ。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
            {date:"1970年代", source:"Konstantin Raudive", text:"72,000件以上のEVPを収集。無音の部屋でも多数の声が録音された。", url:"https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"},
            {date:"現代", source:"karapaia", text:"心霊界から届く声を記録した超常現象。録音中に直接聞こえない声が後で聞こえる。", url:"https://karapaia.com/archives/52176540.html"}
        ];

        function renderPosts(data) {
            const container = document.getElementById('posts');
            container.innerHTML = data.map(p => `
                <div class="post">
                    <div class="post-header">
                        <span>${p.date}</span>
                        <span>${p.source}</span>
                    </div>
                    <div class="post-text">${p.text}</div>
                    <a href="${p.url}" target="_blank" class="source-link">🔗 出典を見る</a>
                </div>
            `).join('');
        }

        function filterPosts() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
            renderPosts(filtered.length ? filtered : posts);
        }

        // 初回表示
        renderPosts(posts);
    </script>
</body>
</html>
