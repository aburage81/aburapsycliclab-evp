<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 脂毛EVPラボ - 世界観測モード</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #c0c0c0; color: #000; font-family: 'VT323', monospace; margin: 0; padding: 20px 10px; min-height: 100vh; box-sizing: border-box; }
        .mac-window { background: #c0c0c0; border: 3px solid #fff; border-right-color: #808080; border-bottom-color: #808080; box-shadow: 4px 4px 0 #000; max-width: 1200px; width: 100%; margin: 0 auto 20px; overflow: hidden; box-sizing: border-box; }
        .title-bar { background: linear-gradient(to right, #000080, #1084d0); color: white; padding: 6px 10px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; font-size: 18px; }
        .btn { width: 18px; height: 18px; background: #c0c0c0; border: 1px solid #fff; border-right-color: #808080; border-bottom-color: #808080; text-align: center; line-height: 14px; font-size: 12px; cursor: pointer; }
        #map { height: 350px; width: 100%; background: #000; filter: grayscale(1) contrast(1.2); border-top: 2px solid #808080; }
        .content { padding: 15px; }
        h1 { font-size: 28px; text-align: center; margin: 0; }
        .subtitle { text-align: center; font-size: 18px; margin-bottom: 20px; color: #000080; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 350px), 1fr)); gap: 15px; }
        .post { background: #c0c0c0; border: 3px inset #fff; border-right-color: #808080; border-bottom-color: #808080; padding: 15px; word-wrap: break-word; }
        .post-header { font-weight: bold; color: #000080; margin-bottom: 8px; border-bottom: 1px dashed #808080; }
        .source-link { color: #0000ff; text-decoration: underline; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="title-bar"><div>📡 世界EVPリアルタイム観測モニタ</div><div class="btn">×</div></div>
        <div id="map"></div>
    </div>
    <div class="mac-window">
        <div class="title-bar"><div>👻 データベース</div><div class="btn">?</div></div>
        <div class="content">
            <h1>電子音声現象アーカイブ</h1>
            <p class="subtitle">Reddit(r/EVP)より自動抽出・翻訳済</p>
            <div class="posts-grid" id="posts"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Pythonがここを自動書き換えします
        const posts = []; 

        const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function render() {
            document.getElementById('posts').innerHTML = posts.map(p => `
                <div class="post">
                    <div class="post-header">${p.date} | ${p.source}</div>
                    <div>${p.text}</div>
                    <a href="${p.url}" target="_blank" class="source-link">🔗 元スレッド</a>
                </div>
            `).join('');
            posts.forEach(p => {
                if(p.lat) L.marker([p.lat, p.lng]).addTo(map).bindPopup(p.text);
            });
        }
        render();
    </script>
</body>
</html>
