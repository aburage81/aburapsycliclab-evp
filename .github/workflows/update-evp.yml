name: 毎日EVP自動更新（世界網羅版）

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 最新EVP情報を取得・生成
        run: |
          # ※ここでは例として、既存の20件に加え、
          # その日の日付を入れた「最新観測レポート」を自動生成するロジックを組み込みます。
          python3 .github/scripts/generate_evp.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "EVP Global Collector"
          git config user.email "evp-bot@github.com"
          git add index.html
          git commit -m "🌐 世界規模EVPアーカイブ自動更新: $(date +'%Y-%m-%d')" || exit 0
          git push
