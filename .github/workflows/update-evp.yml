name: EVP_Realtime_Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser deep-translator
      - name: Run Crawler
        run: python .github/scripts/update_evp.py
      - name: Commit and Push
        run: |
          git config user.name "EVP-Bot"
          git config user.email "bot@evp-lab.com"
          git add index.html
          git commit -m "📡 リアルタイムデータベース更新: $(date)" || exit 0
          git push
