name: 毎日EVP自動更新

on:
  schedule:
    - cron: '0 10 * * *'    # 日本時間 朝10時（毎日）
  workflow_dispatch:        # 手動でも実行可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: EVPデータでHTML生成
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>👻 脂毛EVPラボ - 電子音声現象アーカイブ</title>
              <style>
                  body { background:#0a0a0a; color:#eee; font-family:sans-serif; padding:20px; line-height:1.6; }
                  h1 { color:#ff3333; text-align:center; }
                  .subtitle { text-align:center; color:#88ff88; }
                  input { width:100%; padding:15px; margin:20px 0; background:#1f1f1f; color:white; border:1px solid #444; }
                  .post { background:#1a1a1a; padding:18px; margin:15px 0; border-radius:8px; border-left:6px solid #ff6666; }
              </style>
          </head>
          <body>
              <h1>👻 脂毛EVPラボ</h1>
              <p class="subtitle">電子音声現象アーカイブ｜毎日自動更新中（50件）</p>
              
              <input type="text" id="search" placeholder="🔍 検索" onkeyup="filterPosts()">
              <div id="posts"></div>

              <script>
                  const posts = [
                      {date:"2026-04-28", source:"Wikipedia JP", text:"電子音声現象（EVP）とは、電子機器で死後世界と交信を試みる現象。", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
                      {date:"1959", source:"Friedrich Jürgenson", text:"亡き母親の声『フリードリヒ、あなたは守られています。この声が聞こえますか？』", url:"https://ja.wikipedia.org/wiki/電子音声現象"},
                      {date:"1952", source:"ジェメリ神父", text:"聖歌録音中に亡き父親の声が聞こえた", url:"#"},
                      {date:"1970年代", source:"Konstantin Raudive", text:"72,000件以上のEVPを収集", url:"https://en.wikipedia.org/wiki/Electronic_voice_phenomenon"},
                      // ここにさらに事例を追加できます
                  ];

                  function renderPosts(data) {
                      let html = '';
                      data.forEach(p => {
                          html += `<div class="post"><strong>[${p.source}] ${p.date}</strong><br><br><p>${p.text}</p><a href="${p.url}" target="_blank">🔗 出典</a></div>`;
                      });
                      document.getElementById('posts').innerHTML = html;
                  }

                  function filterPosts() {
                      const term = document.getElementById('search').value.toLowerCase();
                      const filtered = posts.filter(p => p.text.toLowerCase().includes(term));
                      renderPosts(filtered.length ? filtered : posts);
                  }

                  renderPosts(posts);
              </script>
          </body>
          </html>
          EOF

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "EVP Bot"
          git config user.email "evp-bot@github.com"
          git add index.html
          git commit -m "自動更新: $(date +'%Y-%m-%d %H:%M')"
          git push
