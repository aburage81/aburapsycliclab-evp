name: EVP_Realtime_Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5 # バージョンを上げました
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser deep-translator
      - name: Run Crawler
        run: python .github/scripts/update_evp.py
      - name: Commit and Push
        run: |
          git config user.name "EVP-Bot"
          git config user.email "bot@evp-lab.com"
          git add index.html
          git commit -m "📡 記録更新" || exit 0
          git push
