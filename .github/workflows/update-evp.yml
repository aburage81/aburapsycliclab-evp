name: EVP_Daily_Update_Test
on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごとに実行（ただしGitHub側の都合で10分程度かかる場合あり）
  workflow_dispatch:       # 手動実行ボタンも残しておく（推奨）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install libs
        run: pip install feedparser deep-translator
      - name: Update EVP
        run: python .github/scripts/update_evp.py
      - name: Commit
        run: |
          git config user.name "EVP_Bot"
          git config user.email "bot@example.com"
          git add index.html
          git commit -m "Update EVP Archive (Auto Test)" || exit 0
          git push
